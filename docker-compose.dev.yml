services:
  backend:
    command: npm run dev

    environment:
      NODE_ENV: development

    volumes:
      - ./backend:/app

      - /app/node_modules

  frontend:
    build:
      context: ./frontend

      dockerfile: Dockerfile.dev

    command: npm run dev -- --host

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    environment:
      - VITE_API_URL=http://localhost:5000/api
