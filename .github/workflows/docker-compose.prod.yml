version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: emergency_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - emergency_network

  redis:
    image: redis:7-alpine
    container_name: emergency_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - emergency_network

  backend:
    image: ${DOCKERHUB_USERNAME}/emergency-backend:latest
    container_name: emergency_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    depends_on:
      - mongo
      - redis
    networks:
      - emergency_network

  frontend:
    image: ${DOCKERHUB_USERNAME}/emergency-frontend:latest
    container_name: emergency_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - emergency_network

volumes:
  mongo_data:
  redis_data:

networks:
  emergency_network:
    driver: bridge
